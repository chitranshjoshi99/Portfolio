<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="keywords"
      content="Chitransh Joshi, software developer, software engineer, frontend engineer, full-stack developer, React developer, TypeScript, GraphQL, Node.js, Delhivery, Nivoda, Classplus, hire frontend developer India, portfolio"
    />
    <meta name="author" content="Chitransh Joshi" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />

    <!-- ── Theme colour (browser chrome) ──────────────────────── -->
    <meta
      name="theme-color"
      content="#1a1814"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#f4f0ea"
      media="(prefers-color-scheme: light)"
    />
    <meta name="color-scheme" content="dark light" />

    <!-- ── Shared OG basics (not per-route) ───────────────────── -->
    <meta property="og:site_name" content="Chitransh Joshi · Portfolio" />
    <meta property="og:locale" content="en_US" />
    <meta property="profile:first_name" content="Chitransh" />
    <meta property="profile:last_name" content="Joshi" />

    <!-- ═══════════════════════════════════════════════════════════
         PER-ROUTE META — everything between these markers is swapped
         for blog routes by the Vercel function api/page.js.
         %VITE_SITE_URL% is substituted by Vite at build time.
         ═══════════════════════════════════════════════════════════ -->
    <!--SEO-->
    <title>Chitransh Joshi · Portfolio</title>
    <meta
      name="description"
      content="Chitransh Joshi — Frontend-first Full-Stack Engineer with 5+ years building high-performance web apps across logistics (Delhivery), B2B diamond trading (Nivoda), and edtech (Classplus). React, TypeScript, GraphQL, Node.js. Available for senior frontend / full-stack roles."
    />
    <link rel="canonical" href="%VITE_SITE_URL%/" />
    <meta property="og:type" content="profile" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta
      property="og:title"
      content="Chitransh Joshi · Frontend-first Full-Stack Engineer"
    />
    <meta
      property="og:description"
      content="5+ years shipping fast, reliable web products. React · TypeScript · GraphQL · Node.js. Worked at Nivoda, Delhivery &amp; Classplus. Open to senior frontend / full-stack roles."
    />
    <meta property="og:image" content="%VITE_SITE_URL%/profile.jpeg" />
    <meta
      property="og:image:alt"
      content="Chitransh Joshi — Full-Stack Engineer"
    />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="800" />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Chitransh Joshi · Full-Stack Engineer"
    />
    <meta
      name="twitter:description"
      content="5+ yrs building high-perf web apps. React · TypeScript · GraphQL. Worked at Nivoda, Delhivery &amp; Classplus. Available for senior roles."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/profile.jpeg" />
    <meta
      name="twitter:image:alt"
      content="Chitransh Joshi — Full-Stack Engineer"
    />
    <!--/SEO-->

    <!-- ── Favicon & touch icons ──────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/jpeg" href="/profile.jpeg" sizes="any" />
    <link rel="apple-touch-icon" href="/profile.jpeg" />

    <!-- Pixel art font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Preload critical assets ────────────────────────────── -->
    <link rel="preload" as="image" href="/profile.jpeg" fetchpriority="high" />

    <!-- ═══════════════════════════════════════════════════════════
         STRUCTURED DATA — JSON-LD
         ═══════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "%VITE_SITE_URL%/#person",
            "name": "Chitransh Joshi",
            "givenName": "Chitransh",
            "familyName": "Joshi",
            "jobTitle": "Frontend-first Full-Stack Engineer",
            "description": "Software engineer with 5+ years building high-performance web applications across logistics, B2B diamond trading, and edtech. Specialises in React, TypeScript, GraphQL, and Node.js.",
            "url": "%VITE_SITE_URL%/",
            "email": "chitransh.joshi99@gmail.com",
            "telephone": "+918126196827",
            "image": {
              "@type": "ImageObject",
              "url": "%VITE_SITE_URL%/profile.jpeg",
              "width": 800,
              "height": 800
            },
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Gurugram",
              "addressRegion": "Haryana",
              "addressCountry": "IN"
            },
            "sameAs": ["https://github.com/chitranshjoshi99"],
            "knowsAbout": [
              "React",
              "TypeScript",
              "JavaScript",
              "GraphQL",
              "Node.js",
              "PostgreSQL",
              "Redux",
              "Vite",
              "ArgoCD",
              "Datadog",
              "Claude API",
              "Nx"
            ],
            "hasOccupation": {
              "@type": "Occupation",
              "name": "Software Development Engineer",
              "occupationLocation": {
                "@type": "City",
                "name": "Gurugram"
              },
              "skills": "React, TypeScript, GraphQL, Node.js, PostgreSQL"
            },
            "alumniOf": {
              "@type": "EducationalOrganization",
              "name": "Manipal University Jaipur"
            },
            "worksFor": {
              "@type": "Organization",
              "name": "Nivoda LLP"
            }
          },
          {
            "@type": "WebSite",
            "@id": "%VITE_SITE_URL%/#website",
            "name": "Chitransh Joshi · Portfolio",
            "url": "%VITE_SITE_URL%/",
            "description": "Personal portfolio of Chitransh Joshi — Frontend-first Full-Stack Engineer.",
            "author": {
              "@id": "%VITE_SITE_URL%/#person"
            },
            "inLanguage": "en-US"
          },
          {
            "@type": "ProfilePage",
            "@id": "%VITE_SITE_URL%/#profilepage",
            "url": "%VITE_SITE_URL%/",
            "name": "Chitransh Joshi — Engineer Portfolio",
            "isPartOf": {
              "@id": "%VITE_SITE_URL%/#website"
            },
            "mainEntity": {
              "@id": "%VITE_SITE_URL%/#person"
            },
            "breadcrumb": {
              "@type": "BreadcrumbList",
              "itemListElement": [
                {
                  "@type": "ListItem",
                  "position": 1,
                  "name": "Home",
                  "item": "%VITE_SITE_URL%/"
                },
                {
                  "@type": "ListItem",
                  "position": 2,
                  "name": "About & Experience",
                  "item": "%VITE_SITE_URL%/about"
                },
                {
                  "@type": "ListItem",
                  "position": 3,
                  "name": "Blogs",
                  "item": "%VITE_SITE_URL%/blogs"
                },
                {
                  "@type": "ListItem",
                  "position": 4,
                  "name": "Contact",
                  "item": "%VITE_SITE_URL%/contact"
                }
              ]
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <!-- Skip-to-content link for keyboard / screen-reader users -->
    <a href="https://chitransh.dev/" class="skip-link">Skip to main content</a>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
