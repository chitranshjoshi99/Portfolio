<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel art "CJ" monogram favicon -->
  <rect width="16" height="16" fill="#1a1a2e"/>
  <!-- C -->
  <rect x="1" y="2" width="4" height="1" fill="#9b8ea0"/>
  <rect x="1" y="3" width="1" height="5" fill="#9b8ea0"/>
  <rect x="1" y="8" width="4" height="1" fill="#9b8ea0"/>
  <!-- J -->
  <rect x="7" y="2" width="3" height="1" fill="#9b8ea0"/>
  <rect x="9" y="3" width="1" height="5" fill="#9b8ea0"/>
  <rect x="7" y="8" width="2" height="1" fill="#9b8ea0"/>
  <rect x="7" y="7" width="1" height="1" fill="#9b8ea0"/>
  <!-- pixel dot accent -->
  <rect x="1" y="11" width="2" height="2" fill="#c9a96e" opacity="0.7"/>
  <rect x="4" y="13" width="2" height="2" fill="#9b8ea0" opacity="0.5"/>
</svg>
